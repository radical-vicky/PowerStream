{% extends 'base.html' %}
{% load static %}

{% block title %}Video Not Found - vidstream{% endblock %}

{% block content %}
<div class="container">
    <div class="row min-vh-75 align-items-center">
        <div class="col-lg-6 mx-auto text-center">
            <div style="font-size: 6rem; color: var(--text-secondary); margin-bottom: 1rem;">
                <i class="fas fa-video-slash"></i>
            </div>
            <h1 style="font-size: 2.5rem; font-weight: 700; margin-bottom: 1rem;">
                Video Not Found
            </h1>
            <p style="font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 2rem;">
                The video you're looking for doesn't exist or may have been removed by the creator.
            </p>
            <div class="d-flex justify-content-center gap-3">
                <a href="{% url 'videos:list' %}" class="btn btn-primary px-4 py-2">
                    <i class="fas fa-compass me-2"></i>Browse Videos
                </a>
                <a href="{% url 'home' %}" class="btn btn-outline px-4 py-2">
                    <i class="fas fa-home me-2"></i>Go Home
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    .min-vh-75 {
        min-height: 75vh;
    }
</style>
{% endblock %}
