{% extends 'base.html' %}
{% load static %}

{% block title %}Sign Out · vidstream{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="auth-card text-center">
                    <!-- Icon -->
                    <div class="logout-icon">
                        <i class="fas fa-sign-out-alt"></i>
                    </div>

                    <!-- Header -->
                    <h1 class="auth-title">Sign Out</h1>
                    <p class="auth-subtitle mb-4">Are you sure you want to sign out?</p>

                    <!-- Logout Form -->
                    <form method="post" action="{% url 'account_logout' %}">
                        {% csrf_token %}
                        
                        <div class="logout-actions">
                            <button type="submit" class="btn-logout">
                                <i class="fas fa-sign-out-alt me-2"></i>
                                Yes, Sign Out
                            </button>
                            <a href="javascript:history.back()" class="btn-cancel">
                                <i class="fas fa-times me-2"></i>
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.auth-container {
    min-height: calc(100vh - 72px);
    display: flex;
    align-items: center;
    background: var(--bg-dark);
    padding: 2rem 0;
}

.auth-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 3rem 2rem;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: scale(0.95);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

.logout-icon {
    width: 80px;
    height: 80px;
    background: rgba(239, 68, 68, 0.1);
    border: 2px solid rgba(239, 68, 68, 0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
}

.logout-icon i {
    font-size: 2.5rem;
    color: #ef4444;
}

.auth-title {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #fff, #a0a0a0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.auth-subtitle {
    color: var(--text-secondary);
    font-size: 1rem;
}

.logout-actions {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
}

.btn-logout,
.btn-cancel {
    flex: 1;
    padding: 0.875rem;
    border-radius: 12px;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s;
    text-decoration: none;
    text-align: center;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.btn-logout {
    background: #ef4444;
    border: none;
    color: white;
}

.btn-logout:hover {
    background: #dc2626;
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
}

.btn-cancel {
    background: var(--bg-dark);
    border: 1px solid var(--border);
    color: var(--text-primary);
}

.btn-cancel:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
}

/* Responsive */
@media (max-width: 576px) {
    .auth-card {
        padding: 2rem 1.5rem;
        margin: 1rem;
    }

    .logout-actions {
        flex-direction: column;
    }

    .auth-title {
        font-size: 1.75rem;
    }
}
</style>
{% endblock %}
